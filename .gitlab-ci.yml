stages:
  - docker
  - publish

variables:
  REGISTRY: dev.wn:5000
  IMAGE_NAME: mautrix-perplexity

docker:
  stage: docker
  tags:
    - shell
  script:
    - docker buildx create --use --name arm64builder 2>/dev/null || docker buildx use arm64builder
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --build-arg COMMIT_HASH=${CI_COMMIT_SHA}
        --build-arg BUILD_TIME=$(date -Iseconds)
        --build-arg VERSION=${CI_COMMIT_TAG:-0.1.0}
        -t ${REGISTRY}/${IMAGE_NAME}:latest
        -t ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
        --push
        .
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - when: manual

dockerhub:
  stage: publish
  tags:
    - shell
  needs:
    - docker
  script:
    - echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
    - VERSION="${CI_COMMIT_TAG#v}"
    - DOCKERHUB_IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
    - docker buildx imagetools create
        -t ${DOCKERHUB_IMAGE}:${VERSION}
        -t ${DOCKERHUB_IMAGE}:latest
        ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker logout
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: always

