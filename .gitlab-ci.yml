stages:
  - docker
  - publish

variables:
  REGISTRY: dev.wn:5000
  IMAGE_NAME: mautrix-perplexity

docker:
  stage: docker
  tags:
    - shell
  script:
    - |
      cat > /tmp/buildkitd.toml << 'TOML'
      [registry."dev.wn:5000"]
        http = true
        insecure = true
      TOML
    - docker buildx rm multiarch 2>/dev/null || true
    - docker buildx create --use --name multiarch --config /tmp/buildkitd.toml
    - |
      if [[ "${CI_COMMIT_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
        VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
      else
        VERSION="0.1.0-dev.${CI_COMMIT_SHORT_SHA}"
      fi
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --build-arg COMMIT_HASH=${CI_COMMIT_SHA}
        --build-arg BUILD_TIME=$(date -Iseconds)
        --build-arg VERSION=${VERSION}
        -t ${REGISTRY}/${IMAGE_NAME}:${VERSION}
        -t ${REGISTRY}/${IMAGE_NAME}:latest
        -t ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
        --push
        .
    - |
      if [[ "${CI_COMMIT_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
        MAJOR="${BASH_REMATCH[1]}"
        MINOR="${BASH_REMATCH[2]}"
        VERSION="${MAJOR}.${MINOR}.${BASH_REMATCH[3]}"
        docker buildx imagetools create \
          -t ${REGISTRY}/${IMAGE_NAME}:${MAJOR}.${MINOR} \
          -t ${REGISTRY}/${IMAGE_NAME}:${MAJOR} \
          ${REGISTRY}/${IMAGE_NAME}:${VERSION}
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - when: manual

dockerhub:
  stage: publish
  tags:
    - shell
  retry: 2
  needs:
    - docker
  script:
    - |
      cat > /tmp/buildkitd.toml << 'TOML'
      [registry."dev.wn:5000"]
        http = true
        insecure = true
      TOML
    - docker buildx rm multiarch 2>/dev/null || true
    - docker buildx create --use --name multiarch --config /tmp/buildkitd.toml
    - echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
    - VERSION="${CI_COMMIT_TAG#v}"
    - MAJOR="${VERSION%%.*}"
    - MINOR="${VERSION%.*}"
    - DOCKERHUB_IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
    - docker buildx imagetools create
        -t ${DOCKERHUB_IMAGE}:${VERSION}
        -t ${DOCKERHUB_IMAGE}:${MINOR}
        -t ${DOCKERHUB_IMAGE}:${MAJOR}
        -t ${DOCKERHUB_IMAGE}:latest
        ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker logout
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: always
