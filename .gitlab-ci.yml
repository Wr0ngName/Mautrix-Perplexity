stages:
  - docker
  - publish

variables:
  REGISTRY: dev.wn:5000
  IMAGE_NAME: mautrix-perplexity

docker:
  stage: docker
  tags:
    - shell
  resource_group: buildx
  script:
    - |
      cat > /tmp/buildkitd.toml << 'TOML'
      [registry."dev.wn:5000"]
        http = true
        insecure = true
      TOML
    - docker buildx rm multiarch 2>/dev/null || true
    - docker buildx create --use --name multiarch --config /tmp/buildkitd.toml
    - |
      TAGS="-t ${REGISTRY}/${IMAGE_NAME}:latest"
      if [ -n "${CI_COMMIT_TAG}" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        MAJOR="$(echo ${VERSION} | cut -d. -f1)"
        MINOR="$(echo ${VERSION} | cut -d. -f1-2)"
        TAGS="${TAGS} -t ${REGISTRY}/${IMAGE_NAME}:${VERSION}"
        TAGS="${TAGS} -t ${REGISTRY}/${IMAGE_NAME}:${MINOR}"
        TAGS="${TAGS} -t ${REGISTRY}/${IMAGE_NAME}:${MAJOR}"
        TAGS="${TAGS} -t ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
        BUILD_VERSION="${VERSION}"
      else
        DEV_VERSION="0.1.0-dev.${CI_COMMIT_SHORT_SHA}"
        TAGS="-t ${REGISTRY}/${IMAGE_NAME}:${DEV_VERSION} -t ${REGISTRY}/${IMAGE_NAME}:latest"
        BUILD_VERSION="${DEV_VERSION}"
      fi
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --build-arg COMMIT_HASH=${CI_COMMIT_SHA}
        --build-arg BUILD_TIME=$(date -Iseconds)
        --build-arg VERSION=${BUILD_VERSION}
        ${TAGS}
        --push
        .
  after_script:
    - docker buildx rm multiarch 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - when: manual

dockerhub:
  stage: publish
  tags:
    - shell
  resource_group: buildx
  needs:
    - docker
  script:
    - |
      cat > /tmp/buildkitd.toml << 'TOML'
      [registry."dev.wn:5000"]
        http = true
        insecure = true
      TOML
    - docker buildx rm multiarch 2>/dev/null || true
    - docker buildx create --use --name multiarch --config /tmp/buildkitd.toml
    - echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
    - VERSION="${CI_COMMIT_TAG#v}"
    - MAJOR="$(echo ${VERSION} | cut -d. -f1)"
    - MINOR="$(echo ${VERSION} | cut -d. -f1-2)"
    - DOCKERHUB_IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
    - docker buildx imagetools create
        -t ${DOCKERHUB_IMAGE}:${VERSION}
        -t ${DOCKERHUB_IMAGE}:${MINOR}
        -t ${DOCKERHUB_IMAGE}:${MAJOR}
        -t ${DOCKERHUB_IMAGE}:latest
        ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker logout
  after_script:
    - docker buildx rm multiarch 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: always

