stages:
  - docker

variables:
  REGISTRY: dev.wn:5000
  IMAGE_NAME: mautrix-claude

docker:
  stage: docker
  tags:
    - shell
  script:
    - docker build
        --build-arg COMMIT_HASH=${CI_COMMIT_SHA}
        --build-arg BUILD_TIME=$(date -Iseconds)
        --build-arg VERSION=${CI_COMMIT_TAG:-0.1.0}
        -t ${REGISTRY}/${IMAGE_NAME}:latest
        -t ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
        .
    - docker push ${REGISTRY}/${IMAGE_NAME}:latest
    - docker push ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - when: manual
