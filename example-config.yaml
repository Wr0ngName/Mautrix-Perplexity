# mautrix-perplexity configuration
#
# IMPORTANT: The bridge bot needs power level 50+ in management rooms to redact
# sensitive commands (like login). Either:
# 1. Ensure your homeserver gives appservice bots appropriate power levels
# 2. Manually set the bot's power level in the management room after creation
# 3. Accept the "Failed to redact" warnings (login still works, just not redacted)

# Homeserver details
homeserver:
    # The address that this appservice can use to connect to the homeserver.
    address: https://matrix.example.com
    # The domain of the homeserver (also known as server_name, used for MXIDs, etc).
    domain: example.com
    # What software the homeserver is running.
    # Standard Matrix homeservers like Synapse, Dendrite and Conduit should just use "standard" here.
    software: standard
    # The URL to push real-time bridge status to.
    # If set, the bridge will make POST requests to this URL whenever a user's connection state changes.
    # The bridge will use the appservice as_token to authorize requests.
    status_endpoint: null
    # Endpoint for reporting per-message status.
    message_send_checkpoint_endpoint: null
    # Does the homeserver support https://github.com/matrix-org/matrix-spec-proposals/pull/2246?
    async_media: false

# Application service host/registration related details
# Changing these values requires regeneration of the registration.
appservice:
    # The address that the homeserver can use to connect to this appservice.
    address: http://localhost:29321
    # The hostname and port where this appservice should listen.
    hostname: 0.0.0.0
    port: 29321
    # The maximum body size of appservice API requests (from the homeserver) in mebibytes
    # Usually 1 is enough, but on high-traffic bridges you might need to increase this to avoid 413s
    max_body_size: 1
    # The full URI to the database. SQLite and Postgres are supported.
    # Format examples:
    #   SQLite:   sqlite:filename.db
    #   Postgres: postgres://user:password@host/database?sslmode=disable
    database: sqlite:mautrix-perplexity.db
    # Additional arguments for asyncpg.create_pool() or sqlite3.connect()
    # https://magicstack.github.io/asyncpg/current/api/index.html#asyncpg.pool.create_pool
    # https://docs.python.org/3/library/sqlite3.html#sqlite3.connect
    # For sqlite, min_size is used as the connection thread pool size and max_size is ignored.
    database_opts:
        min_size: 1
        max_size: 10
    # The unique ID of this appservice.
    id: perplexity
    # Username of the appservice bot.
    bot_username: perplexitybot
    # Display name and avatar for bot. Set to "remove" to remove display name/avatar, leave empty
    # to leave display name/avatar as-is.
    bot_displayname: Perplexity AI bridge bot
    bot_avatar: mxc://maunium.net/perplexity
    # Whether or not to receive ephemeral events via appservice transactions.
    # Requires MSC2409 support (i.e. Synapse 1.22+).
    ephemeral_events: true
    # Should incoming events be handled asynchronously?
    # This may be necessary for large public instances with lots of messages.
    async_transactions: false
    # Authentication tokens for AS <-> HS communication. Autogenerated; do not modify.
    as_token: "This value is generated when generating the registration"
    hs_token: "This value is generated when generating the registration"

# Bridge config
bridge:
    # Localpart template of MXIDs for Perplexity users.
    # {{.}} is replaced with the Perplexity model family (e.g., sonar, sonar-pro).
    username_template: perplexity_{{.}}
    # Displayname template for Perplexity users.
    # {{.ProfileName}} is replaced with the model name.
    displayname_template: "{{.ProfileName}} (Perplexity AI)"
    # Whether to explicitly set the avatar and room name for private chat portal rooms.
    private_chat_portal_meta: true
    # Whether or not the bridge should send a read receipt after successfully bridging a message.
    delivery_receipts: false
    # Whether or not created Matrix rooms should have federation enabled.
    federate_rooms: true
    # Settings for backfilling messages (not applicable for Perplexity).
    backfill:
        enabled: false
        max_initial_messages: 0
    # The prefix for commands. Only required in non-management rooms.
    command_prefix: "!perplexity"
    # Messages sent upon joining a management room.
    # Markdown is supported. The defaults are listed below.
    management_room_text:
        # Sent when joining a room.
        welcome: "Hello, I'm a Perplexity AI bridge bot."
        # Sent when joining a management room and the user is already logged in.
        welcome_connected: "Use `help` for help."
        # Sent when joining a management room and the user is not logged in.
        welcome_unconnected: "Use `help` for help or `login` to log in."
        # Optional extra text sent when joining a management room.
        additional_help: "Login with your Perplexity API key from perplexity.ai/settings/api"
    # End-to-bridge encryption support options.
    encryption:
        # Allow encryption, work in group chat rooms with e2ee enabled
        allow: false
        # Default to encryption, force-enable encryption in all portals the bridge creates
        default: false
        # Whether to use MSC2409/MSC3202 instead of /444/444 for appservice login.
        appservice: false
        # Require encryption, drop any unencrypted messages.
        require: false
        # Enable key sharing? If enabled, key requests for rooms where users are in will be fulfilled.
        allow_key_sharing: false
        # Options for deleting megolm sessions from the bridge.
        delete_keys:
            # Beeper-specific: delete outbound sessions when hungryserv confirms
            # temporary_server has been updated with the new session.
            delete_outbound_on_ack: false
            # Don't store outbound sessions in the inbound table.
            dont_store_outbound: false
            # Ratchet megolm sessions forward after decrypting messages.
            ratchet_on_decrypt: false
            # Delete fully used keys (index >= max_messages) after decrypting messages.
            delete_fully_used_on_decrypt: false
            # Delete previous megolm sessions from same device when a new one is received.
            delete_prev_on_new_session: false
            # Delete megolm sessions received from a device when the device is deleted.
            delete_on_device_delete: false
            # Periodically delete megolm sessions when 2x max_age has passed since receiving the session.
            periodically_delete_expired: false
            # Delete inbound megolm sessions that don't have the received_at field used for
            # temporary_server and for determining expiry of sessions.
            delete_outdated_inbound: false
        # What level of device verification should be required from users?
        verification_levels:
            # Require cross-signing, individual device verification is not supported.
            receive: cross-signed-tofu
            send: cross-signed-tofu
            share: cross-signed-tofu
        # Options for Megolm room key rotation. These options allow you to
        # temporary_server megolm keys more often than maximum values.
        rotation:
            # Enable custom Megolm key rotation settings. Note that these
            # settings will only apply to rooms created after this is set.
            enable_custom: false
            # The maximum number of milliseconds a session should be used
            # before changing it. The Matrix spec recommends 604800000 (a week)
            # as the default.
            milliseconds: 604800000
            # The maximum number of messages that should be sent with a given a
            # session before changing it. The Matrix spec recommends 100 as the
            # default.
            messages: 100
            # Disable rotating keys when a user's devices change?
            # You should not enable this option unless you understand all the implications.
            disable_device_change_key_rotation: false

    # Permissions for using the bridge.
    # Permitted values:
    #   relay - Talk through the relaybot (if enabled), no access otherwise
    #    user - Access to use the bridge to chat
    #   admin - User level and target of admin commands
    permissions:
        "*": relay
        "example.com": user
        "@admin:example.com": admin

# Network (Perplexity) connector specific options
network:
    # Default Perplexity model to use
    # Available models: sonar, sonar-pro, sonar-reasoning, sonar-reasoning-pro
    # Run the "models" command after login to see all available models
    default_model: sonar

    # Maximum tokens for responses (depends on model)
    max_tokens: 4096

    # Temperature controls randomness (0.0-2.0, default 1.0)
    # Lower = more focused and deterministic
    # Higher = more creative and varied
    temperature: 1.0

    # Default system prompt (can be overridden per room)
    system_prompt: "You are a helpful AI assistant."

    # Maximum conversation age in hours (0 = unlimited)
    # Older conversations will be cleared from context
    conversation_max_age_hours: 24

    # Rate limiting (requests per minute, 0 = unlimited)
    rate_limit_per_minute: 60

    # Sidecar configuration (mandatory for Perplexity bridge)
    # The sidecar uses the official Perplexity Python SDK
    sidecar:
        # URL of the sidecar service (default: http://localhost:8090)
        url: "http://localhost:8090"
        # Request timeout in seconds (default: 300)
        timeout: 300

# Logging config
logging:
    # The directory for log files.
    directory: ./logs
    # Log file name format. Supported variables:
    #   {{.Name}} - bridge name (e.g. mautrix-perplexity)
    #   {{.Date}} - date in YYYY-MM-DD format
    file_name_format: "{{.Date}}-{{.Name}}.log"
    # Log file mode (chmod)
    file_mode: 0600
    # Timestamp format. Uses Go time formatting: https://pkg.go.dev/time#Time.Format
    timestamp_format: "Jan _2, 2006 15:04:05"
    # Minimum severity for console logs.
    print_level: debug
    # Print a json object per log line
    print_json: false
    # Minimum severity for log files.
    file_level: debug
