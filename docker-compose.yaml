services:
  mautrix-perplexity:
    container_name: mautrix-perplexity
    image: mautrix-perplexity:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - UID=1000
      - GID=1000
    # Perplexity sidecar is lightweight compared to Claude Agent SDK
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    # If you're using a postgres database, uncomment the following:
    # depends_on:
    #   - postgres

  # Uncomment and configure if you need a database
